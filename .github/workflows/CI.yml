name: My Petclinic

on: 
  push:
    branches: ["main", "test"]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Give permission to mvnw
        run: chmod +x mvnw

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
      
      - name: Build Docker image 
        run: docker build -t pets-hsptl:$IMAGE_TAG .


      - name: Checkout code 
        uses: actions/checkout@v4

      - name: Aws Configure 
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ${{secrets.AWS_REGION}}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Repo creation
        run: |
          aws ecr create-repository --repository-name petshsptlhyd --region ${{secrets.AWS_REGION}}

      - name: Tag img
        run: |
          docker tag pets-hsptl:$IMAGE_TAG ${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com/petshsptlhyd:$IMAGE_TAG

      - name: Push img to ecr
        run: |
          docker push ${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com/petshsptlhyd:$IMAGE_TAG

      # - name: pull img from ecr to ec2
      #   run: |
      #     docker pull ${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com/petshsptls:latest
